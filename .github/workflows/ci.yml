name: CI

# Playwright "can be run on push" (to main) and "will be run in PR".
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + Nuxt tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the exact pnpm version from package.json `packageManager` (11.4.0),
      # which satisfies the packageManagerStrict / -Version gates in pnpm-workspace.yaml.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # engines requires >=24 (engineStrict: true)
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec vitest run

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache browser binaries; the lockfile hash changes when Playwright is bumped.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - run: pnpm exec playwright test

      # Upload the HTML report even when tests fail — this is where the
      # `<rule-id>-cicd.png` screenshots come from (open it, snip the error panel).
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
